<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | Anna Hefors Systemic Method</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dom: {
                            graphite: '#1e1e1e',
                            gold: '#d9b372',
                            goldLeaf: '#cca26b',
                            goldDark: '#a4814a',
                            beige: '#f4e4ce',
                            white: '#ffffff',
                        }
                    },
                    fontFamily: {
                        messiri: ['"Cinzel"', 'serif'],
                        montserrat: ['"Montserrat"', 'sans-serif'],
                    },
                    backgroundImage: {
                        'gold-gradient': 'linear-gradient(135deg, #d9b372 0%, #a4814a 100%)',
                        'graphite-gradient': 'linear-gradient(180deg, #1e1e1e 0%, #2a2622 100%)',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --dom-graphite: #1e1e1e;
            --dom-gold: #d9b372;
            --dom-gold-dark: #a4814a;
            --dom-beige: #f4e4ce;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background:
                radial-gradient(circle at 15% 20%, rgba(217, 179, 114, 0.13), transparent 35%),
                radial-gradient(circle at 85% 10%, rgba(164, 129, 74, 0.1), transparent 35%),
                linear-gradient(180deg, #f8f0e2 0%, #f4e4ce 45%, #efe2cf 100%);
            color: var(--dom-graphite);
        }

        main {
            transition: opacity 0.35s ease;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #d9b372; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a4814a; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        .gold-text-glow { text-shadow: 0 0 20px rgba(217, 179, 114, 0.3); }
        
        .nav-link {
            position: relative;
            letter-spacing: 0.03em;
            transition: color 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            left: 0.5rem;
            right: 0.5rem;
            bottom: 0.25rem;
            height: 1.5px;
            background: linear-gradient(90deg, transparent 0%, var(--dom-gold) 50%, transparent 100%);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        .nav-link:hover::after,
        .nav-link-active::after {
            transform: scaleX(1);
        }

        .nav-link-active {
            color: var(--dom-gold);
            background: rgba(217, 179, 114, 0.08);
        }

        #mobile-menu button {
            transition: background-color 0.25s ease, color 0.25s ease, transform 0.25s ease;
        }

        #mobile-menu button:hover {
            background: rgba(217, 179, 114, 0.1);
            transform: translateX(4px);
        }

        button {
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
        }

        button:hover {
            filter: saturate(1.05);
        }

        button:focus-visible {
            outline: 2px solid var(--dom-gold);
            outline-offset: 2px;
        }

        section {
            position: relative;
        }

        section::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 10% 15%, rgba(217, 179, 114, 0.06), transparent 30%),
                radial-gradient(circle at 90% 85%, rgba(164, 129, 74, 0.05), transparent 28%);
            pointer-events: none;
        }

        section > * {
            position: relative;
            z-index: 1;
        }

        .bg-white,
        .bg-white\/80,
        .bg-white\/5 {
            box-shadow: 0 14px 45px rgba(30, 30, 30, 0.09);
        }

        @media (max-width: 768px) {
            .fade-in {
                animation-duration: 0.6s;
            }
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            max-height: 400px;
            margin: 0 auto;
        }
        
        .masonry-grid {
            column-count: 1;
            column-gap: 2rem;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 2rem;
        }

        .video-ribbon {
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 0.5rem;
        }

        .video-ribbon-track {
            display: flex;
            gap: 1rem;
            min-width: max-content;
        }

        .video-ribbon-card {
            width: 320px;
            scroll-snap-align: start;
            background: linear-gradient(140deg, rgba(20, 16, 10, 0.94), rgba(34, 26, 15, 0.9));
            border: 1px solid rgba(217, 179, 114, 0.32);
            box-shadow: 0 16px 35px rgba(12, 10, 7, 0.32);
        }

        .video-ribbon-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 45px rgba(12, 10, 7, 0.4);
        }

        .bridge-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
            opacity: 0.9;
            filter: drop-shadow(0 0 8px rgba(217, 179, 114, 0.24));
        }

        /* Brand Redesign */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(180deg, rgba(15, 13, 10, 0.72), rgba(15, 13, 10, 0.72)),
                url('./dom-assets/pattern-rings.png');
            background-size: auto, 540px;
            background-repeat: no-repeat, repeat;
            background-position: center, center;
            pointer-events: none;
            z-index: -2;
        }

        #navbar {
            background:
                linear-gradient(90deg, rgba(11, 10, 8, 0.94), rgba(38, 30, 16, 0.92)),
                url('./dom-assets/pattern-rings.png');
            background-size: cover, 360px;
            border-bottom: 1px solid rgba(217, 179, 114, 0.32);
        }

        .brand-logo {
            height: 68px;
            width: auto;
            filter: drop-shadow(0 0 18px rgba(217, 179, 114, 0.18));
            transition: transform 0.35s ease, filter 0.35s ease;
        }

        #navbar .brand-logo {
            height: 96px;
        }

        footer .brand-logo {
            height: 86px;
        }

        .group:hover .brand-logo {
            transform: translateY(-1px) scale(1.02);
            filter: drop-shadow(0 0 26px rgba(217, 179, 114, 0.3));
        }

        .home-hero {
            min-height: auto;
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 236, 191, 0.92), rgba(247, 224, 176, 0.82) 40%, rgba(231, 205, 154, 0.9) 100%),
                linear-gradient(140deg, #f8e8c4 0%, #efd8a8 50%, #e5c88f 100%);
        }

        .home-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('./dom-assets/pattern-rings.png') center/560px repeat;
            opacity: 0.2;
            pointer-events: none;
        }

        .hero-frame {
            border: 1px solid rgba(170, 124, 52, 0.38);
            background: linear-gradient(145deg, rgba(255, 247, 229, 0.82), rgba(242, 221, 176, 0.74));
            box-shadow: 0 18px 55px rgba(136, 99, 39, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.42);
            backdrop-filter: blur(4px);
        }

        .hero-logo-shell {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            border: none;
            background: transparent;
            box-shadow: none;
            width: min(92vw, 760px);
            margin-inline: auto;
            line-height: 1;
        }

        .hero-logo-shell::before {
            content: none;
        }

        .hero-main-logo {
            width: 100%;
            max-width: 620px;
            height: auto;
            object-fit: contain;
            object-position: center center;
            display: block;
            filter: drop-shadow(0 12px 24px rgba(130, 89, 30, 0.22));
        }

        .hero-badge {
            border: 1px solid rgba(166, 120, 50, 0.42);
            background: linear-gradient(90deg, rgba(255, 243, 214, 0.9), rgba(241, 219, 175, 0.82));
        }

        .home-section {
            position: relative;
            overflow: hidden;
            padding-top: 5.5rem;
            padding-bottom: 5.5rem;
        }

        .home-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('./dom-assets/pattern-rings.png') center/520px repeat;
            opacity: 0.06;
            pointer-events: none;
        }

        .home-surface {
            position: relative;
            z-index: 1;
        }

        .home-title {
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.08;
            letter-spacing: 0.01em;
        }

        .home-subtitle {
            font-size: clamp(1rem, 2vw, 1.15rem);
            line-height: 1.75;
            color: rgba(31, 24, 15, 0.78);
        }

        .home-panel {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(251, 244, 229, 0.9));
            border: 1px solid rgba(190, 148, 82, 0.2);
            border-radius: 1.75rem;
            box-shadow: 0 20px 45px rgba(127, 94, 35, 0.12);
        }

        .home-value-card {
            height: 100%;
            padding: 2rem;
            border: 1px solid rgba(186, 143, 75, 0.2);
            border-radius: 1.5rem;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.95), rgba(249, 238, 213, 0.7));
            box-shadow: 0 14px 34px rgba(136, 99, 39, 0.1);
            transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
        }

        .home-value-card:hover {
            transform: translateY(-5px);
            border-color: rgba(178, 132, 62, 0.42);
            box-shadow: 0 20px 44px rgba(136, 99, 39, 0.16);
        }

        .gold-heading {
            color: #f0d39c;
            text-shadow: 0 0 20px rgba(217, 179, 114, 0.32);
        }

        .path-reflection-wrap {
            position: relative;
        }

        .path-layer {
            position: relative;
            z-index: 1;
        }

        .path-layer-top::after {
            content: '';
            position: absolute;
            left: 3%;
            right: 3%;
            bottom: -62px;
            height: 84px;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(56, 51, 45, 0.16), rgba(56, 51, 45, 0)),
                repeating-linear-gradient(90deg, rgba(204, 162, 107, 0.18) 0 18px, rgba(204, 162, 107, 0) 18px 34px);
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 90%);
            transform: scaleY(-1);
            opacity: 0.45;
            filter: blur(0.6px);
        }

        .path-layer-bottom::before {
            content: '';
            position: absolute;
            left: 3%;
            right: 3%;
            top: -62px;
            height: 84px;
            pointer-events: none;
            background:
                linear-gradient(0deg, rgba(244, 228, 206, 0.32), rgba(244, 228, 206, 0)),
                repeating-linear-gradient(90deg, rgba(217, 179, 114, 0.22) 0 18px, rgba(217, 179, 114, 0) 18px 34px);
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent 90%);
            opacity: 0.38;
            filter: blur(0.8px);
        }

        .path-mirror-line {
            position: relative;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -8px 0 12px;
            z-index: 2;
        }

        .path-mirror-line::before {
            content: '';
            position: absolute;
            left: 5%;
            right: 5%;
            top: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(204, 162, 107, 0.9), transparent);
        }

        .path-mirror-line::after {
            content: '';
            position: absolute;
            left: 7%;
            right: 7%;
            top: calc(50% - 8px);
            height: 16px;
            border-top: 1px solid rgba(204, 162, 107, 0.5);
            border-bottom: 1px solid rgba(204, 162, 107, 0.35);
            border-radius: 999px;
            opacity: 0.5;
            animation: pathWaterDrift 5.5s ease-in-out infinite;
        }

        .path-mirror-chip {
            position: relative;
            z-index: 1;
            font-family: "Montserrat", sans-serif;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #8d6a34;
            background: linear-gradient(90deg, rgba(244, 228, 206, 0.92), rgba(236, 215, 173, 0.88));
            border: 1px solid rgba(204, 162, 107, 0.45);
            border-radius: 999px;
            padding: 8px 14px;
            box-shadow: 0 10px 24px rgba(141, 106, 52, 0.16);
        }

        @keyframes pathWaterDrift {
            0%, 100% { transform: translateX(0) scaleX(1); opacity: 0.46; }
            50% { transform: translateX(8px) scaleX(1.02); opacity: 0.7; }
        }

        .hero-portrait-wrap {
            position: relative;
            border: 1px solid rgba(217, 179, 114, 0.4);
            background: radial-gradient(circle at 50% 15%, rgba(255, 220, 152, 0.24), rgba(20, 16, 11, 0.65));
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .hero-portrait-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('./dom-assets/ornament-flower.png') center/140% no-repeat;
            opacity: 0.16;
        }

        .hero-portrait {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            mix-blend-mode: screen;
        }

        .bg-dom-graphite {
            background-image:
                linear-gradient(140deg, #100e0b 0%, #1c1611 64%, #2b2116 100%),
                url('./dom-assets/pattern-rings.png');
            background-size: cover, 420px;
            background-blend-mode: normal, soft-light;
        }

        footer {
            background:
                linear-gradient(130deg, #0f0d0a 0%, #201911 100%),
                url('./dom-assets/pattern-rings.png');
            background-size: cover, 380px;
            border-top: 1px solid rgba(217, 179, 114, 0.32);
        }

        .futuristic-grid {
            position: relative;
            isolation: isolate;
        }

        .futuristic-grid::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(217, 179, 114, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217, 179, 114, 0.05) 1px, transparent 1px);
            background-size: 36px 36px;
            opacity: 0.35;
            pointer-events: none;
            z-index: -1;
        }

        .futuristic-grid::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(217, 179, 114, 0.22), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .method-star-panel {
            background:
                radial-gradient(circle at 18% 16%, rgba(255, 246, 227, 0.65), transparent 40%),
                radial-gradient(circle at 82% 14%, rgba(240, 217, 173, 0.5), transparent 42%),
                linear-gradient(145deg, rgba(248, 235, 210, 0.96), rgba(236, 215, 176, 0.92));
            border: 1px solid rgba(204, 162, 107, 0.45);
            box-shadow: 0 20px 60px rgba(120, 86, 37, 0.18), inset 0 0 0 1px rgba(255, 255, 255, 0.45);
        }

        .method-page-bg {
            background:
                radial-gradient(circle at 50% -12%, rgba(255, 251, 239, 0.8), transparent 42%),
                radial-gradient(circle at 8% 88%, rgba(204, 162, 107, 0.35), transparent 38%),
                radial-gradient(circle at 88% 84%, rgba(183, 137, 79, 0.26), transparent 34%),
                linear-gradient(145deg, #f4e4ce 0%, #ead6b3 48%, #cca26b 100%);
            position: relative;
        }

        .method-page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 30% 30%, rgba(56, 51, 45, 0.08) 0, rgba(56, 51, 45, 0.02) 32%, transparent 62%),
                radial-gradient(circle at 70% 70%, rgba(56, 51, 45, 0.07) 0, rgba(56, 51, 45, 0.02) 30%, transparent 58%),
                url('./dom-assets/pattern-rings.png') center/520px repeat;
            mix-blend-mode: multiply;
            opacity: 0.18;
            pointer-events: none;
        }

        .about-portrait {
            border: 1px solid rgba(217, 179, 114, 0.38);
            box-shadow: 0 18px 55px rgba(19, 15, 10, 0.28);
            background: linear-gradient(180deg, rgba(31, 24, 15, 0.88), rgba(18, 14, 9, 0.95));
        }

        .about-page-bg {
            background:
                radial-gradient(circle at 12% 10%, rgba(255, 240, 210, 0.95), rgba(255, 240, 210, 0) 42%),
                radial-gradient(circle at 88% 12%, rgba(245, 218, 166, 0.65), rgba(245, 218, 166, 0) 40%),
                linear-gradient(150deg, #fffaf0 0%, #f7ebd3 50%, #f2dfb8 100%);
        }

        .about-page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('./dom-assets/pattern-rings.png') center/520px repeat;
            opacity: 0.08;
            pointer-events: none;
        }

        .about-surface {
            position: relative;
            z-index: 1;
        }

        .about-light-card {
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.95), rgba(248, 237, 213, 0.78));
            border: 1px solid rgba(186, 143, 75, 0.22);
            box-shadow: 0 16px 38px rgba(131, 97, 39, 0.14);
        }

        .story-card {
            height: 100%;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.98), rgba(247, 235, 208, 0.82));
            border: 1px solid rgba(183, 140, 72, 0.2);
            border-radius: 1.5rem;
            box-shadow: 0 12px 34px rgba(140, 103, 43, 0.12);
            padding: 1.5rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .story-card:hover {
            transform: translateY(-4px);
            border-color: rgba(176, 130, 59, 0.42);
            box-shadow: 0 18px 38px rgba(140, 103, 43, 0.18);
        }

        .story-photo {
            width: 64px;
            height: 64px;
            border-radius: 999px;
            border: 2px solid rgba(214, 173, 107, 0.7);
            object-fit: cover;
            box-shadow: 0 6px 14px rgba(125, 87, 31, 0.2);
        }

        .telegram-ribbon {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(240px, 320px);
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.4rem;
            scroll-snap-type: x mandatory;
        }

        .telegram-ribbon::-webkit-scrollbar {
            height: 6px;
        }

        .telegram-ribbon::-webkit-scrollbar-thumb {
            background: rgba(180, 136, 66, 0.45);
            border-radius: 999px;
        }

        .telegram-shot {
            scroll-snap-align: start;
            border-radius: 1.1rem;
            border: 1px solid rgba(184, 142, 74, 0.25);
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.96), rgba(245, 232, 202, 0.78));
            box-shadow: 0 10px 24px rgba(126, 91, 35, 0.12);
            overflow: hidden;
        }

        .telegram-shot img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .product-enroll {
            background: linear-gradient(145deg, #d9b36f 0%, #d2a95f 100%);
            border: 1px solid rgba(109, 74, 24, 0.22);
            box-shadow: 0 20px 50px rgba(112, 79, 28, 0.22);
        }

        .product-enroll-input {
            width: 100%;
            border: 1px solid rgba(112, 76, 26, 0.22);
            background: rgba(255, 255, 255, 0.9);
            border-radius: 999px;
            padding: 1rem 1.2rem;
            color: #2f271f;
            font-family: 'Montserrat', sans-serif;
        }

        .product-enroll-input::placeholder {
            color: rgba(56, 45, 34, 0.62);
        }

        .lang-switch {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            border-radius: 999px;
            border: 1px solid rgba(217, 179, 114, 0.35);
            background: rgba(217, 179, 114, 0.08);
        }

        .lang-switch-link {
            font-family: "Montserrat", sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(244, 228, 206, 0.85);
            padding: 7px 11px;
            border-radius: 999px;
            line-height: 1;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .lang-switch-link:hover {
            color: #ffffff;
            background: rgba(217, 179, 114, 0.2);
        }

        .lang-switch-link.active {
            color: #2a2115;
            background: linear-gradient(120deg, #e3c282, #cca26b);
        }

        @media (max-width: 1024px) {
            .home-hero {
                padding-top: 1rem;
                padding-bottom: 1rem;
            }

            #navbar .brand-logo {
                height: 72px;
            }

            .hero-logo-shell {
                padding: 0;
                width: min(92vw, 460px);
            }

            .hero-main-logo {
                max-width: 460px;
                width: 100%;
            }

            .home-section {
                padding-top: 4.25rem;
                padding-bottom: 4.25rem;
            }
        }
    </style>
</head>
<body class="bg-dom-beige text-dom-graphite font-montserrat antialiased overflow-x-hidden relative">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-dom-graphite/95 backdrop-blur-md border-b border-dom-gold/30 transition-all duration-300 shadow-[0_4px_30px_rgba(0,0,0,0.3)]" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-24 md:h-28">
                <div class="flex-shrink-0 flex items-center cursor-pointer group" onclick="navigateTo('home')">

        function navigateTo(viewName) {
            state.currentView = viewName;
            updateActiveNav(viewName);
            if (viewName !== 'method' && window.__starCleanup) {
                window.__starCleanup();
                window.__starCleanup = null;
            }
            
            const mobileMenu = document.getElementById('mobile-menu');
            if(mobileMenu) mobileMenu.classList.add('hidden');
            
            const main = document.getElementById('app-content');
            let template = document.getElementById(`view-${viewName}`);
            
            if (!template) {
               console.warn(`View template 'view-${viewName}' not found.`);
               return;
            }
            
            main.style.opacity = 0;
            setTimeout(() => {
                main.innerHTML = template.innerHTML;
                main.style.opacity = 1;
                
                if (viewName === 'method') {
                    setTimeout(drawMethodStar, 50);
                }
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 200);
        }

        function updateActiveNav(viewName) {
            const navButtons = document.querySelectorAll('.nav-link[data-nav]');
            const mainView = viewName.startsWith('path-') ? 'path' : viewName;
            navButtons.forEach((btn) => {
                btn.classList.toggle('nav-link-active', btn.dataset.nav === mainView);
            });
        }

        function submitProductForm(event, productId) {
            event.preventDefault();
            const product = productDetails[productId];
            if (!product) return;
            const form = event.target;
            const formData = new FormData(form);
            const name = (formData.get('name') || '').toString().trim();
            const email = (formData.get('email') || '').toString().trim();
            const phone = (formData.get('phone') || '').toString().trim();
            const consent = formData.get('consent');

            if (!name || !email || !phone || !consent) {
                alert('Пожалуйста, заполните все поля формы и подтвердите согласие.');
                return;
            }

            const text = [
                'Новая заявка на программу DOM',
                `Продукт: ${product.title}`,
                `Стоимость: ${product.price}`,
                `Имя: ${name}`,
                `Email: ${email}`,
                `Телефон: ${phone}`
            ].join('\n');

            window.open(`https://t.me/itbrain_support?text=${encodeURIComponent(text)}`, '_blank');
            form.reset();
            alert('Заявка отправлена. Мы свяжемся с вами в ближайшее время.');
        }

                            <div class="product-enroll p-8 md:p-12 rounded-[2.2rem] relative overflow-hidden">

                                        <p class="font-montserrat text-sm text-dom-graphite/75">Format: ${product.tag}. After registration, the DOM support team will contact you and confirm participation details.</p>

                                    <form onsubmit="submitProductForm(event, '${productId}')" class="bg-white/20 border border-white/35 rounded-3xl p-6 md:p-8">

                main.style.opacity = 1;
                window.scrollTo(0, 0);

        // --- METHOD VIEW LOGIC (STAR CANVAS) ---
        function drawMethodStar() {
            const canvas = document.getElementById('starCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (window.__starCleanup) window.__starCleanup();

            const width = canvas.width;
            const height = canvas.height;
            const cx = width / 2;
            const cy = height / 2;
            const R = 138;
            const mouse = { x: 0, y: 0 };
            let raf = null;
            if (!window.__bridgeElementImg) {
                const img = new Image();
                img.src = './dom-assets/bridge-element.png';
                window.__bridgeElementImg = img;
            }
            const bridgeImg = window.__bridgeElementImg;

            const onMove = (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
                mouse.y = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
            };
            const onLeave = () => { mouse.x = 0; mouse.y = 0; };
            canvas.addEventListener('mousemove', onMove);
            canvas.addEventListener('mouseleave', onLeave);

            function rotatePoint(x, y, angle) {
                return {
                    x: x * Math.cos(angle) - y * Math.sin(angle),
                    y: x * Math.sin(angle) + y * Math.cos(angle)
                };
            }

            function drawTriangle(points, fill, stroke) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.lineTo(points[2].x, points[2].y);
                ctx.closePath();
                ctx.fillStyle = fill;
                ctx.strokeStyle = stroke;
                ctx.lineWidth = 2.2;
                ctx.fill();
                ctx.stroke();
            }

            function drawLabel(letter, sub, x, y) {
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.font = '700 11px "Montserrat", sans-serif';
                const subWidth = ctx.measureText(sub).width;
                const w = Math.max(108, Math.min(188, subWidth + 24));
                const h = 42;
                const rx = x - w / 2;
                const ry = y - h / 2;

                ctx.fillStyle = 'rgba(56,51,45,0.8)';
                ctx.strokeStyle = 'rgba(217,179,114,0.62)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(rx, ry, w, h, 12);
                ctx.fill();
                ctx.stroke();

                ctx.font = '700 13px "Montserrat", sans-serif';
                ctx.fillStyle = '#d9b372';
                ctx.fillText(letter, x, y - 8);

                ctx.font = '600 11px "Montserrat", sans-serif';
                ctx.fillStyle = '#f4e4ce';
                ctx.fillText(sub, x, y + 9);
                ctx.restore();
            }

            function render(ts) {
                const t = ts * 0.001;
                const spin = t * 0.18 + mouse.x * 0.2;
                const sway = mouse.y * 12;
                ctx.clearRect(0, 0, width, height);

                ctx.save();
                ctx.translate(cx, cy + sway);

                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 62 + i * 20, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(217,179,114,${0.2 - i * 0.035})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                const baseUp = [
                    { x: 0, y: -R },
                    { x: R * 0.866025, y: R * 0.5 },
                    { x: -R * 0.866025, y: R * 0.5 }
                ];
                const baseDown = [
                    { x: 0, y: R },
                    { x: -R * 0.866025, y: -R * 0.5 },
                    { x: R * 0.866025, y: -R * 0.5 }
                ];
                const up = baseUp.map((p) => {
                    const r = rotatePoint(p.x, p.y, spin);
                    return { x: r.x, y: r.y };
                });
                const down = baseDown.map((p) => {
                    const r = rotatePoint(p.x, p.y, -spin * 0.92);
                    return { x: r.x, y: r.y };
                });

                ctx.shadowColor = 'rgba(217, 179, 114, 0.35)';
                ctx.shadowBlur = 18;
                drawTriangle(up, 'rgba(217,179,114,0.10)', 'rgba(217,179,114,0.9)');
                drawTriangle(down, 'rgba(217,179,114,0.05)', 'rgba(217,179,114,0.85)');
                ctx.shadowBlur = 0;

                if (bridgeImg && bridgeImg.complete) {
                    const pulse = 1 + Math.sin(t * 1.6) * 0.035;
                    const bridgeW = 196 * pulse;
                    const bridgeH = 186 * pulse;
                    ctx.save();
                    ctx.globalAlpha = 0.72;
                    ctx.translate(0, 0);
                    ctx.rotate(-spin * 0.35);
                    ctx.shadowColor = 'rgba(217,179,114,0.34)';
                    ctx.shadowBlur = 22;
                    ctx.drawImage(bridgeImg, -bridgeW / 2, -bridgeH / 2 - 6, bridgeW, bridgeH);
                    ctx.restore();
                }

                const labels = [
                    { l: 'D', s: 'Money', x: 0, y: -R - 40, a: spin },
                    { l: 'O', s: 'Relationships', x: -R * 0.866025 - 52, y: R * 0.5 + 28, a: spin },
                    { l: 'M', s: 'Ментальность', x: R * 0.866025 + 58, y: R * 0.5 + 28, a: spin },
                    { l: 'D', s: 'Дух', x: 0, y: R + 40, a: -spin * 0.92 },
                    { l: 'O', s: 'Awareness', x: -R * 0.866025 - 52, y: -R * 0.5 - 28, a: -spin * 0.92 },
                    { l: 'M', s: 'Worldview', x: R * 0.866025 + 58, y: -R * 0.5 - 28, a: -spin * 0.92 }
                ];
                labels.forEach((item) => {
                    const rp = rotatePoint(item.x, item.y, item.a);
                    drawLabel(item.l, item.s, rp.x, rp.y);
                });

                ctx.shadowColor = 'rgba(224, 193, 136, 0.85)';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(0, 0, 45, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(217,179,114,0.5)';
                ctx.lineWidth = 1.4;
                ctx.stroke();
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 15px "Montserrat", sans-serif';
                ctx.fillText('ЛЮБОВЬ', 0, 0);

                ctx.restore();
                raf = requestAnimationFrame(render);
            }

            raf = requestAnimationFrame(render);
            window.__starCleanup = () => {
                canvas.removeEventListener('mousemove', onMove);
                canvas.removeEventListener('mouseleave', onLeave);
                if (raf) cancelAnimationFrame(raf);
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            navigateTo('home');
            const btn = document.getElementById('mobile-menu-btn');
            const menu = document.getElementById('mobile-menu');
            if(btn && menu) {
                btn.addEventListener('click', () => {
                    menu.classList.toggle('hidden');
                });
            }
        });
    </script>
